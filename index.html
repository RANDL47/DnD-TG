<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>D&D Мастер</title>
    <style>
        body {
            font-family: 'Garamond', serif;
            background-color: #1a120b;
            color: #e5d3b3;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            text-align: center;
        }
        h1 {
            color: #d4af37;
            text-shadow: 1px 1px 2px black;
            margin-bottom: 20px;
        }
        .game-container {
            max-width: 350px;
            margin: 0 auto;
        }
        .action-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .action-btn {
            background-color: #2c1e16;
            border: 2px solid #5c4033;
            color: #f0e6d2;
            padding: 12px 16px;
            font-size: 18px;
            font-family: 'Garamond', serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            flex: 1 0 40%; /* Две кнопки в ряд */
            min-width: 120px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #0d0907;
        }
        .action-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0d0907;
            background-color: #3a281e;
            border-color: #8a6e5e;
        }
        .info-text {
            background-color: #2c1e16;
            border: 1px solid #5c4033;
            border-radius: 8px;
            padding: 12px;
            margin: 20px 0;
            font-size: 16px;
            color: #c4a882;
        }
        .close-btn {
            background-color: #5c1a1a;
            border: 2px solid #8a2b2b;
            color: #f0e6d2;
            padding: 10px 20px;
            font-size: 16px;
            font-family: 'Garamond', serif;
            font-weight: bold;
            cursor: pointer;
            border-radius: 20px;
            width: 100%;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #2b0c0c;
        }
        .close-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2b0c0c;
            background-color: #7a2424;
        }
        /* Стили для поля ввода и кнопки отправки */
        .custom-action {
            margin-top: 15px;
        }
        .custom-action input {
            width: 70%;
            padding: 10px;
            background-color: #2c1e16;
            border: 2px solid #5c4033;
            color: #f0e6d2;
            border-radius: 8px 0 0 8px;
            font-family: 'Garamond', serif;
            font-size: 16px;
        }
        .custom-action button {
            width: 30%;
            padding: 10px;
            background-color: #2c1e16;
            border: 2px solid #5c4033;
            border-left: none;
            color: #f0e6d2;
            border-radius: 0 8px 8px 0;
            font-family: 'Garamond', serif;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .custom-action button:active {
            background-color: #3a281e;
        }
    </style>
</head>
<body>

<div class="game-container">
    <h1>⚔️ D&D Мастер ⚔️</h1>
    
    <div class="info-text" id="statusMessage">
        Выберите действие, и Мастер опишет результат...
    </div>

    <div class="action-grid">
        <button class="action-btn" data-action="Осматриваюсь в поисках приключений">👀 Осмотреться</button>
        <button class="action-btn" data-action="Иду в таверну искать работу">🍺 В таверну</button>
        <button class="action-btn" data-action="Пытаюсь взломать замок сундука">🔓 Взломать</button>
        <button class="action-btn" data-action="Атакую ближайшего гоблина">⚔️ Атаковать</button>
    </div>

    <!-- Поле для кастомного действия -->
    <div class="custom-action">
        <input type="text" id="customActionInput" placeholder="Своё действие...">
        <button id="sendCustomActionBtn">🗣️ Сказать</button>
    </div>

    <button class="close-btn" id="closeAppBtn">🚪 Закрыть книгу</button>
</div>

<!-- Подключаем официальную библиотеку Telegram Web App -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    // Инициализируем приложение
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand(); // Раскрываем на весь экран

    // Получаем элементы
    const statusEl = document.getElementById('statusMessage');
    const actionBtns = document.querySelectorAll('.action-btn');
    const customInput = document.getElementById('customActionInput');
    const sendCustomBtn = document.getElementById('sendCustomActionBtn');
    const closeBtn = document.getElementById('closeAppBtn');

    // Функция для отправки данных боту
    function sendAction(action) {
        // Показываем сообщение о том, что действие отправлено
        statusEl.innerText = `🎲 Вы решаете: "${action}"...`;
        
        // Отправляем данные боту. После этого приложение закроется.
        // Бот получит это сообщение в web_app_data.
        tg.sendData(action);
    }

    // Навешиваем обработчики на кнопки с готовыми действиями
    actionBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const action = btn.dataset.action;
            sendAction(action);
        });
    });

    // Обработчик для кастомного действия
    sendCustomBtn.addEventListener('click', () => {
        const customAction = customInput.value.trim();
        if (customAction) {
            sendAction(customAction);
        } else {
            statusEl.innerText = '⚠️ Опишите ваше действие, путник.';
        }
    });

    // Также можно отправить по нажатию Enter в поле ввода
    customInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const customAction = customInput.value.trim();
            if (customAction) {
                sendAction(customAction);
            } else {
                statusEl.innerText = '⚠️ Опишите ваше действие, путник.';
            }
        }
    });

    // Кнопка "Закрыть" (просто закрывает приложение)
    closeBtn.addEventListener('click', () => {
        tg.close();
    });
</script>
</body>
</html>
