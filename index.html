<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Создание персонажа D&D</title>
    <style>
        body {
            font-family: 'Garamond', serif;
            background-color: #1a120b;
            color: #e5d3b3;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
        }
        h1 {
            color: #d4af37;
            text-shadow: 1px 1px 2px black;
            text-align: center;
            margin-bottom: 20px;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
        }
        .character-sheet {
            background-color: #2c1e16;
            border: 2px solid #5c4033;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .character-sheet label {
            display: block;
            margin-top: 12px;
            color: #c4a882;
            font-weight: bold;
        }
        .character-sheet input, .character-sheet textarea {
            width: 100%;
            padding: 10px;
            margin-top: 4px;
            background-color: #1a120b;
            border: 1px solid #5c4033;
            color: #f0e6d2;
            border-radius: 6px;
            font-family: 'Garamond', serif;
            font-size: 16px;
            box-sizing: border-box;
        }
        .character-sheet textarea {
            min-height: 80px;
            resize: vertical;
        }
        .save-btn {
            background-color: #3a281e;
            border: 2px solid #8a6e5e;
            color: #f0e6d2;
            padding: 12px;
            margin-top: 20px;
            width: 100%;
            font-weight: bold;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #1a120b;
        }
        .save-btn:active {
            background-color: #5c4033;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #1a120b;
        }
        .hint {
            font-size: 14px;
            color: #a08060;
            margin-top: 10px;
            text-align: center;
        }
        .close-btn {
            background-color: #5c1a1a;
            border: 2px solid #8a2b2b;
            color: #f0e6d2;
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 20px;
            width: 100%;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .close-btn:active {
            background-color: #7a2424;
            transform: translateY(2px);
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⚔️ СОЗДАНИЕ ГЕРОЯ ⚔️</h1>
    
    <div class="character-sheet">
        <label>Имя персонажа:</label>
        <input type="text" id="charName" placeholder="Арктур Храбрый" maxlength="50">
        
        <label>Раса:</label>
        <input type="text" id="charRace" placeholder="Человек / Эльф / Дварф...">
        
        <label>Класс:</label>
        <input type="text" id="charClass" placeholder="Воин / Маг / Вор...">
        
        <label>Способности и снаряжение:</label>
        <textarea id="charAbilities" placeholder="Длинный меч, кольчуга, зелье лечения, навык скрытности..."></textarea>
        
        <label>Предыстория (необязательно):</label>
        <textarea id="charBackstory" placeholder="Откуда ты родом, почему стал искателем приключений..."></textarea>
        
        <button class="save-btn" id="saveCharacterBtn">💾 СОХРАНИТЬ И ИГРАТЬ</button>
        <div class="hint">Данные отправятся Мастеру, и он будет помнить твоего героя.</div>
    </div>

    <button class="close-btn" id="closeAppBtn">🚪 Закрыть</button>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Элементы формы
    const nameInput = document.getElementById('charName');
    const raceInput = document.getElementById('charRace');
    const classInput = document.getElementById('charClass');
    const abilitiesInput = document.getElementById('charAbilities');
    const backstoryInput = document.getElementById('charBackstory');
    const saveBtn = document.getElementById('saveCharacterBtn');
    const closeBtn = document.getElementById('closeAppBtn');

    // Загрузка сохранённых данных из localStorage (черновик)
    function loadSavedCharacter() {
        const saved = localStorage.getItem('dnd_character_draft');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                nameInput.value = data.name || '';
                raceInput.value = data.race || '';
                classInput.value = data.class || '';
                abilitiesInput.value = data.abilities || '';
                backstoryInput.value = data.backstory || '';
            } catch(e) {}
        }
    }
    
    // Автосохранение черновика при вводе
    function saveDraft() {
        const draft = {
            name: nameInput.value,
            race: raceInput.value,
            class: classInput.value,
            abilities: abilitiesInput.value,
            backstory: backstoryInput.value
        };
        localStorage.setItem('dnd_character_draft', JSON.stringify(draft));
    }
    
    [nameInput, raceInput, classInput, abilitiesInput, backstoryInput].forEach(input => {
        input.addEventListener('input', saveDraft);
    });
    
    loadSavedCharacter();

    // Отправка персонажа боту
    function sendCharacter() {
        const name = nameInput.value.trim();
        if (!name) {
            alert('⚠️ Введите хотя бы имя персонажа!');
            return;
        }

        const params = new URLSearchParams();
        params.append('name', name);
        params.append('race', raceInput.value.trim() || 'Неизвестно');
        params.append('class', classInput.value.trim() || 'Неизвестно');
        params.append('abilities', abilitiesInput.value.trim() || '');
        params.append('backstory', backstoryInput.value.trim() || '');
        
        const dataString = params.toString();
        
        // Визуальный фидбек
        saveBtn.textContent = '⏳ Отправка...';
        saveBtn.disabled = true;
        
        // Отправляем данные боту (окно закроется)
        tg.sendData(dataString);
    }

    saveBtn.addEventListener('click', sendCharacter);
    closeBtn.addEventListener('click', () => tg.close());
</script>
</body>
</html>
